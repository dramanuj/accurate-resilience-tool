<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resilience Indicators Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --accent: #4C6FFF;
      --accent-hover: #3a5be0;
      --border: #dde1ee;
      --text-main: #1f2430;
      --text-sub: #5b6275;
      --pill-bg: #eef0fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }
    header { padding: 1.5rem 2rem 0.5rem; }
    h1 { margin: 0; font-size: 1.7rem; }
    .subtitle { margin-top: 0.35rem; font-size: 0.9rem; color: var(--text-sub); }
    main { padding: 0 2rem 2rem; }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1rem 1.2rem 1.2rem;
      box-shadow: 0 12px 24px rgba(15,23,42,0.06);
      border: 1px solid var(--border);
    }

    /* ── Filter section ───────────────────────────── */
    .filter-section { margin-bottom: 0.9rem; }

    .search-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      margin-bottom: 0.8rem;
    }
    .search-row > .search-wrap { flex: 1; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-sub);
      display: block;
      margin-bottom: 0.25rem;
    }
    input[type="search"] {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      background: #fff;
      color: var(--text-main);
    }
    input[type="search"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: transparent;
    }

    /* Clear button */
    .btn-clear {
      padding: 0.42rem 0.9rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text-sub);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.12s, color 0.12s;
    }
    .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

    /* Filter grid: principle full-width, then 3-col row */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .filter-group--wide { grid-column: 1 / -1; }

    .filter-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 0;
    }

    /* ── Chips ─────────────────────────────────────── */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      padding: 0.1rem 0;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      border: 1.5px solid #c5cce8;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #5b6275;
      user-select: none;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      white-space: nowrap;
      line-height: 1.3;
    }
    .chip:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
      background: #f0f3ff;
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Sub-options below chip groups */
    .chip-sub {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.15rem;
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      user-select: none;
      text-transform: none;
      letter-spacing: normal;
      margin-bottom: 0;
    }
    .chip-sub input { margin: 0; cursor: pointer; accent-color: var(--accent); }
    .chip-sub span { cursor: pointer; }

    /* ── Count info ───────────────────────────────── */
    .count-info {
      font-size: 0.8rem;
      color: var(--text-sub);
      margin-bottom: 0.3rem;
      margin-top: 0.1rem;
    }

    /* ── Table ────────────────────────────────────── */
    .table-wrapper {
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      max-height: 68vh;
      overflow-y: auto;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead {
      position: sticky;
      top: 0;
      background: #f2f4ff;
      z-index: 1;
    }
    th, td {
      padding: 0.45rem 0.6rem;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid #edf0fb;
    }
    th {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    th.sort-asc::after { content: " ▲"; font-size: 0.6rem; }
    th.sort-desc::after { content: " ▼"; font-size: 0.6rem; }
    tbody tr:nth-child(even) { background: #fafbff; }
    tbody tr:hover { background: #eef2ff; }

    .indicator-name {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.1rem;
    }
    .description { color: var(--text-sub); font-size: 0.78rem; }

    /* Principle pills */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: var(--pill-bg);
      color: #3a4a7a;
      font-size: 0.68rem;
      font-weight: 500;
      margin: 0 0.1rem 0.15rem 0;
    }
    /* Disruption pills – warm amber tint */
    .pill-disruption {
      background: #fef8ee;
      color: #a16207;
    }

    .pub-title { font-weight: 500; margin-bottom: 0.1rem; font-size: 0.78rem; }
    .pub-meta { font-size: 0.72rem; color: var(--text-sub); }
    a.paper-link {
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    a.paper-link:hover { text-decoration: underline; }

    /* Column widths */
    th:nth-child(1), td:nth-child(1) { min-width: 180px; max-width: 260px; }
    th:nth-child(2), td:nth-child(2) { min-width: 120px; }
    th:nth-child(3), td:nth-child(3) { min-width: 100px; }
    th:nth-child(4), td:nth-child(4) { min-width: 110px; }
    th:nth-child(5), td:nth-child(5) { min-width: 110px; }
    th:nth-child(6), td:nth-child(6) { min-width: 180px; }

    /* Active-filter summary bar */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.45rem;
      min-height: 1.6rem;
    }
    .active-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
      background: #e8ecff;
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 600;
    }
    .active-tag button {
      border: none;
      background: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0;
      line-height: 1;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      header, main { padding: 1rem; }
      .card { padding: 0.8rem 0.9rem 1rem; }
      .filter-grid { grid-template-columns: 1fr 1fr; }
      .filter-group--wide { grid-column: 1 / -1; }
      th, td { padding: 0.4rem 0.5rem; }
    }
    @media (max-width: 600px) {
      .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <h1>Resilience Indicators Explorer</h1>
  <p class="subtitle">
    Explore indicators from the literature, filter by resilience principle, indicator type, stage, and disruption level, and jump to the original paper.
  </p>
</header>
<main>
  <section class="card">

    <div class="filter-section">

      <!-- Search + Clear -->
      <div class="search-row">
        <div class="search-wrap">
          <label for="search">Search</label>
          <input id="search" type="search" placeholder="Search indicators, descriptions, authors, titles…" />
        </div>
        <button class="btn-clear" id="clearBtn">Clear all filters</button>
      </div>

      <!-- Chip filter grid -->
      <div class="filter-grid">

        <!-- Resilience Principle – spans full width -->
        <div class="filter-group filter-group--wide">
          <label class="filter-label">Resilience Principle</label>
          <div class="chip-group" id="principleChips"></div>
          <label class="chip-sub">
            <input type="checkbox" id="excludeNA" />
            <span>Hide indicators with no principle (N/A)</span>
          </label>
        </div>

        <!-- Indicator Type -->
        <div class="filter-group">
          <label class="filter-label">Indicator Type</label>
          <div class="chip-group" id="typeChips"></div>
          <label class="chip-sub">
            <input type="checkbox" id="exclusiveMode" />
            <span>Exact match only (no mixed types)</span>
          </label>
        </div>

        <!-- Resilience Stage -->
        <div class="filter-group">
          <label class="filter-label">Resilience Stage</label>
          <div class="chip-group" id="stageChips"></div>
        </div>

        <!-- Disruption Level -->
        <div class="filter-group">
          <label class="filter-label">Disruption Level</label>
          <div class="chip-group" id="disruptionChips"></div>
        </div>

      </div><!-- /.filter-grid -->

      <!-- Active filter tags (dynamic) -->
      <div class="active-filters" id="activeTags"></div>

    </div><!-- /.filter-section -->

    <div class="count-info"><span id="count"></span></div>

    <div class="table-wrapper">
      <table id="indicatorTable">
        <thead>
          <tr>
            <th data-key="indicator">Indicator</th>
            <th data-key="principles">Principles</th>
            <th data-key="indicator_type">Indicator Type</th>
            <th data-key="stage">Stage</th>
            <th data-key="disruption_levels">Disruption Level</th>
            <th data-key="publication">Publication</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </section>
</main>

<script>
(function () {
  const rawData = JSON.parse(document.getElementById('data').textContent);

  // ── State ──────────────────────────────────────────────────────────────────
  const selectedPrinciples = new Set();
  const selectedTypes      = new Set();
  const selectedStages     = new Set();
  const selectedDisruptions = new Set();
  let exclusiveMode = false;
  let hideNA        = false;
  let searchTerm    = '';
  let currentSort   = { key: 'indicator', direction: 'asc' };

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const searchInput    = document.getElementById('search');
  const excludeNACheck = document.getElementById('excludeNA');
  const exclusiveCheck = document.getElementById('exclusiveMode');
  const clearBtn       = document.getElementById('clearBtn');
  const countSpan      = document.getElementById('count');
  const activeTags     = document.getElementById('activeTags');
  const tableBody      = document.querySelector('#indicatorTable tbody');

  // ── Chip options ────────────────────────────────────────────────────────────
  const allPrinciples   = Array.from(new Set(rawData.flatMap(r => r.principles))).sort((a,b) => a.localeCompare(b));
  const typeOptions     = ['Topological', 'Attributional', 'Performance'];
  const stageOptions    = ['Pre-Disruption', 'System Decline', 'Recovery', 'Post-Disruption'];
  const disruptOptions  = ['Machine', 'Operation', 'Enterprise', 'Market', 'Society', 'No Validation Case'];

  // ── Build chips ─────────────────────────────────────────────────────────────
  function buildChips(containerId, options, selectedSet, filterKey) {
    const container = document.getElementById(containerId);
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = opt;
      btn.dataset.value = opt;
      btn.dataset.filterKey = filterKey;
      btn.setAttribute('aria-pressed', 'false');
      btn.addEventListener('click', () => toggleChip(btn, opt, selectedSet));
      container.appendChild(btn);
    });
  }

  function toggleChip(btn, value, selectedSet) {
    if (selectedSet.has(value)) {
      selectedSet.delete(value);
      btn.classList.remove('active');
      btn.setAttribute('aria-pressed', 'false');
    } else {
      selectedSet.add(value);
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
    }
    filterData();
  }

  buildChips('principleChips', allPrinciples, selectedPrinciples, 'principle');
  buildChips('typeChips',       typeOptions,   selectedTypes,      'type');
  buildChips('stageChips',      stageOptions,  selectedStages,     'stage');
  buildChips('disruptionChips', disruptOptions, selectedDisruptions, 'disruption');

  // ── Active filter tags ──────────────────────────────────────────────────────
  function updateActiveTags() {
    activeTags.innerHTML = '';

    const addTag = (label, onRemove) => {
      const tag = document.createElement('span');
      tag.className = 'active-tag';
      tag.innerHTML = escapeHtml(label) + ' <button aria-label="Remove filter">×</button>';
      tag.querySelector('button').addEventListener('click', onRemove);
      activeTags.appendChild(tag);
    };

    selectedPrinciples.forEach(v => addTag('Principle: ' + v, () => {
      selectedPrinciples.delete(v);
      document.querySelector(`#principleChips .chip[data-value="${CSS.escape(v)}"]`)?.classList.remove('active');
      filterData();
    }));
    selectedTypes.forEach(v => addTag('Type: ' + v, () => {
      selectedTypes.delete(v);
      document.querySelector(`#typeChips .chip[data-value="${CSS.escape(v)}"]`)?.classList.remove('active');
      filterData();
    }));
    selectedStages.forEach(v => addTag('Stage: ' + v, () => {
      selectedStages.delete(v);
      document.querySelector(`#stageChips .chip[data-value="${CSS.escape(v)}"]`)?.classList.remove('active');
      filterData();
    }));
    selectedDisruptions.forEach(v => addTag('Disruption: ' + v, () => {
      selectedDisruptions.delete(v);
      document.querySelector(`#disruptionChips .chip[data-value="${CSS.escape(v)}"]`)?.classList.remove('active');
      filterData();
    }));
    if (exclusiveMode) addTag('Exact type match', () => {
      exclusiveCheck.checked = false;
      exclusiveMode = false;
      filterData();
    });
    if (hideNA) addTag('Hide N/A', () => {
      excludeNACheck.checked = false;
      hideNA = false;
      filterData();
    });
  }

  // ── Filter logic ────────────────────────────────────────────────────────────
  function matchesPrinciple(r) {
    if (selectedPrinciples.size === 0) return true;
    return r.principles.some(p => selectedPrinciples.has(p));
  }

  function matchesType(r) {
    if (selectedTypes.size === 0) return true;
    if (exclusiveMode) {
      return selectedTypes.has(r.indicator_type);
    }
    return Array.from(selectedTypes).some(t =>
      r.indicator_type.toLowerCase().includes(t.toLowerCase())
    );
  }

  function normalizeStage(s) {
    return s.toLowerCase().replace(/[-\s]/g, '');
  }

  function matchesStage(r) {
    if (selectedStages.size === 0) return true;
    return Array.from(selectedStages).some(s =>
      normalizeStage(r.stage).includes(normalizeStage(s))
    );
  }

  function matchesDisruption(r) {
    if (selectedDisruptions.size === 0) return true;
    return (r.disruption_levels || []).some(d => selectedDisruptions.has(d));
  }

  function matchesSearch(r) {
    if (!searchTerm) return true;
    const hay = [r.indicator, r.description, r.title, r.author, r.cite_key]
      .filter(Boolean).join(' ').toLowerCase();
    return hay.includes(searchTerm);
  }

  function filterData() {
    let rows = rawData.filter(r => {
      if (hideNA && r.principles.length === 1 && r.principles[0] === 'N/A') return false;
      return matchesPrinciple(r) && matchesType(r) && matchesStage(r) &&
             matchesDisruption(r) && matchesSearch(r);
    });
    rows = sortData(rows);
    renderTable(rows);
    updateActiveTags();
  }

  // ── Sort ────────────────────────────────────────────────────────────────────
  function sortData(rows) {
    const { key, direction } = currentSort;
    const dir = direction === 'asc' ? 1 : -1;
    return rows.slice().sort((a, b) => {
      let va, vb;
      if (key === 'principles')      { va = (a.principles||[]).join(', ');        vb = (b.principles||[]).join(', '); }
      else if (key === 'disruption_levels') { va = (a.disruption_levels||[]).join(', '); vb = (b.disruption_levels||[]).join(', '); }
      else if (key === 'publication') { va = a.title || ''; vb = b.title || ''; }
      else                           { va = a[key] || '';                         vb = b[key] || ''; }
      return va.toString().localeCompare(vb.toString()) * dir;
    });
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function shortAuthor(row) {
    if (!row.author) return '';
    const first = row.author.split(' and ')[0];
    return first.split(',')[0].trim();
  }

  function buildPublicationCell(row) {
    const title  = row.title  || '[title missing]';
    const author = shortAuthor(row);
    const year   = row.year   || '';
    const journal= row.journal|| '';
    let line2 = '';
    const bits = [author, year, journal].filter(Boolean);
    if (bits.length) line2 = bits.join(' · ');
    let html = '<div class="pub-title">' + escapeHtml(title) + '</div>';
    if (line2) html += '<div class="pub-meta">' + escapeHtml(line2) + '</div>';
    const linkUrl = row.url || (row.doi ? 'https://doi.org/' + row.doi : '');
    if (linkUrl) html += '<a class="paper-link" href="' + encodeURI(linkUrl) + '" target="_blank" rel="noopener noreferrer">Open paper</a>';
    return html;
  }

  function renderTable(rows) {
    tableBody.innerHTML = '';
    for (const r of rows) {
      const tr = document.createElement('tr');

      // Indicator + description
      const tdInd = document.createElement('td');
      tdInd.innerHTML = '<div class="indicator-name">' + escapeHtml(r.indicator) + '</div>' +
        (r.description ? '<div class="description">' + escapeHtml(r.description) + '</div>' : '');
      tr.appendChild(tdInd);

      // Principles
      const tdPrin = document.createElement('td');
      tdPrin.innerHTML = (r.principles||[]).map(p =>
        '<span class="pill">' + escapeHtml(p) + '</span>'
      ).join('');
      tr.appendChild(tdPrin);

      // Indicator type
      const tdType = document.createElement('td');
      tdType.textContent = r.indicator_type || '';
      tr.appendChild(tdType);

      // Stage
      const tdStage = document.createElement('td');
      tdStage.textContent = r.stage || '';
      tr.appendChild(tdStage);

      // Disruption level
      const tdDisrupt = document.createElement('td');
      tdDisrupt.innerHTML = (r.disruption_levels||[]).map(d =>
        '<span class="pill pill-disruption">' + escapeHtml(d) + '</span>'
      ).join('');
      tr.appendChild(tdDisrupt);

      // Publication
      const tdPub = document.createElement('td');
      tdPub.innerHTML = buildPublicationCell(r);
      tr.appendChild(tdPub);

      tableBody.appendChild(tr);
    }
    const total = rawData.length;
    const shown = rows.length;
    countSpan.textContent = shown + ' indicator' + (shown === 1 ? '' : 's') +
      ' shown (of ' + total + ')';
  }

  // ── Sort headers ────────────────────────────────────────────────────────────
  document.querySelectorAll('th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.getAttribute('data-key');
      if (currentSort.key === key) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.key = key;
        currentSort.direction = 'asc';
      }
      document.querySelectorAll('th[data-key]').forEach(t => t.classList.remove('sort-asc','sort-desc'));
      th.classList.add(currentSort.direction === 'asc' ? 'sort-asc' : 'sort-desc');
      filterData();
    });
  });

  // ── Event listeners ─────────────────────────────────────────────────────────
  searchInput.addEventListener('input', () => {
    searchTerm = searchInput.value.trim().toLowerCase();
    filterData();
  });
  excludeNACheck.addEventListener('change', () => {
    hideNA = excludeNACheck.checked;
    filterData();
  });
  exclusiveCheck.addEventListener('change', () => {
    exclusiveMode = exclusiveCheck.checked;
    filterData();
  });
  clearBtn.addEventListener('click', () => {
    selectedPrinciples.clear();
    selectedTypes.clear();
    selectedStages.clear();
    selectedDisruptions.clear();
    exclusiveMode = false;
    hideNA = false;
    searchTerm = '';
    searchInput.value = '';
    excludeNACheck.checked = false;
    exclusiveCheck.checked = false;
    document.querySelectorAll('.chip.active').forEach(c => {
      c.classList.remove('active');
      c.setAttribute('aria-pressed','false');
    });
    filterData();
  });

  // ── Initial render ───────────────────────────────────────────────────────────
  document.querySelector('th[data-key="indicator"]').classList.add('sort-asc');
  filterData();
})();
